<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= INTRO ================= -->
<div id="intro">
  <div class="intro-text">You are invited</div>
</div>

<!-- ================= PEARLS ================= -->
<div class="pearls"></div>

<!-- ================= MAIN ================= -->
<main id="app">

  <!-- HERO -->
  <section class="hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="names">Лидия & Денис</div>
      <div class="subtitle">07.08.2026 · 14:20</div>

      <div id="countdown">загрузка...</div>
    </div>

  </section>

  <!-- DETAILS -->
  <section class="section">
    <h2>ЗАГС</h2>
    <p>Рудничный район · 14:20</p>
  </section>

  <section class="section">
    <h2>Банкет</h2>
    <p>«Волна» · Томская 5 · 16:00</p>
  </section>

  <!-- DRESS CODE -->
  <section class="section">
    <h2>Дресс-код</h2>
    <div class="photo-frame">
      Фото-примеры (добавим позже)
    </div>
  </section>

  <!-- RSVP -->
  <section class="section">
    <h2>Подтверждение</h2>
    <p>Напишите нам в Telegram</p>
    <button onclick="window.open('https://t.me/your_link_here')">
      RSVP в Telegram
    </button>
  </section>

</main>

<!-- ================= MUSIC + SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
