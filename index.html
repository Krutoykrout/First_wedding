<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invitation</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- INTRO SCREEN -->
  <div id="intro">
    <h1 class="intro-text">You are invited</h1>
  </div>

  <!-- MAIN WRAPPER -->
  <main id="app">

    <!-- HERO SECTION -->
    <section class="hero">

      <!-- background overlay -->
      <div class="hero-overlay"></div>

      <!-- pearls layer (canvas/animation later) -->
      <div class="pearls"></div>

      <!-- couple names -->
      <div class="hero-content">
        <h2 class="names">
          Лидия<br/>&<br/>Денис
        </h2>

        <p class="subtitle">Wedding Invitation</p>
      </div>

    </section>

    <!-- INVITE SECTION -->
    <section class="section invite">
      <h3>Приглашение</h3>
      <p>
        Мы будем рады разделить с вами этот особенный день.
      </p>
    </section>

    <!-- TIMER SECTION -->
    <section class="section timer">
      <h3>До свадьбы осталось</h3>
      <div id="countdown">00 : 00 : 00 : 00</div>
    </section>

    <!-- PHOTO SECTION -->
    <section class="section photo">
      <div class="photo-frame">
        <!-- сюда вставишь фото пары -->
      </div>
    </section>

    <!-- DRESS CODE -->
    <section class="section dresscode">
      <h3>Dress Code</h3>
      <p>Black & White Elegance</p>
    </section>

    <!-- RSVP -->
    <section class="section rsvp">
      <h3>RSVP</h3>
      <button>Ответить в Telegram</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
