<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Свадебное приглашение</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-text">You are invited</div>
</div>

<!-- MAIN -->
<main id="app">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <div class="names">Лидия & Денис</div>
      <div class="date">07.08.2026 · 14:20</div>
      <div id="countdown"></div>
    </div>
  </section>

  <!-- SECTION 1 -->
  <section class="curve">
    <div class="card show">
      <h2>Церемония</h2>
      <p>ЗАГС Рудничного района</p>
      <p>07.08.2026 · 14:20</p>
    </div>
  </section>

  <!-- SECTION 2 -->
  <section class="curve alt">
    <div class="card">
      <h2>Банкет</h2>
      <p>16:00</p>
      <p>«Волна», ул. Томская 5</p>
    </div>
  </section>

  <!-- SECTION 3 -->
  <section class="curve">
    <div class="card">
      <h2>Дресс-код</h2>
      <p>Чёрный · Белый · Бежевый</p>

      <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
      </div>
    </div>
  </section>

  <!-- SECTION 4 -->
  <section class="curve alt">
    <div class="card">
      <h2>Подтверждение</h2>
      <p>Пожалуйста, подтвердите участие</p>

      <button onclick="window.location.href='mailto:ekenotova@yandex.ru?subject=RSVP&body=Имя:%0AГости:%0A'">
        Подтвердить участие
      </button>
    </div>
  </section>

</main>

<script src="script.js"></script>

</body>
</html>
